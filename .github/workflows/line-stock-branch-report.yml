name: line-stock-ai-review

on:
  workflow_dispatch:
  schedule:
    # 21:10 Asia/Taipei, Monday-Friday. GitHub Actions schedules use UTC.
    - cron: "10 13 * * 1-5"

concurrency:
  group: line-stock-ai-review-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ai-review-line-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      ENABLE_LINE_PUSH: "true"
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.AI_POWERED_STOCK }}
      LINE_TO: ${{ secrets.LINE_TO }}
      LINE_BROADCAST: "false"
      DAILY_FINANCE_REPORT_URL: "https://wusftnt-bot.github.io/daily-finance-report/"
      AI_STOCK_BRANCH_REPORT_LIMIT: "8"
      AI_STOCK_GEMINI_REVIEW_LIMIT: "5"
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL_SEQUENCE: "gemini-2.5-flash-lite,gemini-2.5-flash"
      GEMINI_RETRY: "1"
      GEMINI_TIMEOUT_SEC: "20"
      AI_STOCK_MAX_RUNTIME_SEC: "900"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Taipei date
        id: taipei
        shell: bash
        run: |
          today="$(TZ=Asia/Taipei date +%F)"
          hm="$(TZ=Asia/Taipei date +%H%M)"
          echo "today=$today" >> "$GITHUB_OUTPUT"
          echo "hm=$hm" >> "$GITHUB_OUTPUT"
          echo "sent_marker=.sent/line/line-stock-ai-review-$today.txt" >> "$GITHUB_OUTPUT"
          echo "sent_cache_key=line-stock-ai-review-$today" >> "$GITHUB_OUTPUT"
          echo "data_cache_prefix=ai-stock-data-cache-" >> "$GITHUB_OUTPUT"

      - name: Guard scheduled AI review window
        id: push-window
        shell: bash
        run: |
          hm="${{ steps.taipei.outputs.hm }}"
          if [ "${{ github.event_name }}" = "schedule" ] && { [ "$hm" -lt 2110 ] || [ "$hm" -gt 2140 ]; }; then
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            echo "AI review schedule fired outside Taipei window; skip push. taipei_hm=$hm"
          else
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore AI review sent marker
        id: sent-cache
        if: steps.push-window.outputs.allowed == 'true'
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.taipei.outputs.sent_marker }}
          key: ${{ steps.taipei.outputs.sent_cache_key }}

      - name: Check AI review sent marker
        id: sent
        if: steps.push-window.outputs.allowed == 'true'
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ steps.sent-cache.outputs.cache-hit }}" = "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "LINE AI review already sent today via cache marker."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore AI stock data cache
        if: steps.push-window.outputs.allowed == 'true' && steps.sent.outputs.skip != 'true'
        uses: actions/cache/restore@v4
        with:
          path: .cache/line-ai-stock-bot
          key: ${{ steps.taipei.outputs.data_cache_prefix }}${{ steps.taipei.outputs.today }}
          restore-keys: |
            ${{ steps.taipei.outputs.data_cache_prefix }}${{ steps.taipei.outputs.today }}-
            ${{ steps.taipei.outputs.data_cache_prefix }}

      - name: Set up Python
        if: steps.push-window.outputs.allowed == 'true' && steps.sent.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run AI review and push LINE message
        if: steps.push-window.outputs.allowed == 'true' && steps.sent.outputs.skip != 'true'
        shell: bash
        env:
          AI_STOCK_DATA_CACHE_DIR: .cache/line-ai-stock-bot
        run: |
          start_ts=$(date +%s)
          python scripts/ai_stock_bot.py --branch-report --push-line
          end_ts=$(date +%s)
          elapsed=$((end_ts - start_ts))
          echo "AI_STOCK_REVIEW_WORKFLOW_RUNTIME elapsed_seconds=$elapsed"

      - name: Create AI review sent marker
        if: steps.push-window.outputs.allowed == 'true' && steps.sent.outputs.skip != 'true' && github.event_name == 'schedule'
        shell: bash
        run: |
          mkdir -p "$(dirname "${{ steps.taipei.outputs.sent_marker }}")"
          {
            echo "line-stock-ai-review"
            echo "date=${{ steps.taipei.outputs.today }}"
            echo "sent_at_utc=$(date -u -Iseconds)"
            echo "run_id=${{ github.run_id }}"
            echo "event=${{ github.event_name }}"
          } > "${{ steps.taipei.outputs.sent_marker }}"

      - name: Save AI review sent marker
        if: steps.push-window.outputs.allowed == 'true' && steps.sent.outputs.skip != 'true' && github.event_name == 'schedule'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: ${{ steps.taipei.outputs.sent_marker }}
          key: ${{ steps.taipei.outputs.sent_cache_key }}
